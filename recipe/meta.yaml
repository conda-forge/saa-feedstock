{% set name = "saa" %}
{% set version = "0.0.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/saa-{{ version }}.tar.gz
  sha256: fd7e432ede573e6ebb04444124492470c46422997bba7cc8147e7338ac83eef1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pdm-backend
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - saa
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Proteusiq/saa
  summary: Converting time into natural language phrases
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
